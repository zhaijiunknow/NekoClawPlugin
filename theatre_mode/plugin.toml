[plugin]
name = "剧场模式"
description = "生成 Galgame 风格剧场场景，并提供独立 UI 与主页面覆盖层联动。"
version = "0.1.0"
id = "theatre_mode"
entry = "plugins.theatre_mode:TheatrePlugin"

[plugin.author]
name = "Claude"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin_runtime]
enabled = true
auto_start = true

[plugin.store]
enabled = true

[theatre_mode]
enabled = true
model = ""
base_url = ""
api_key = ""
timeout_seconds = 30
default_affection = 50
default_mood = 0
max_affection = 100
min_affection = 0
max_mood = 10
min_mood = -10
