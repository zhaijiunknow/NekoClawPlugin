<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧场模式</title>
  <link rel="stylesheet" href="./style.css">
  <script src="/static/libs/live2dcubismcore.min.js"></script>
  <script src="/static/libs/live2d.min.js"></script>
  <script src="/static/libs/pixi.min.js"></script>
  <script src="/static/libs/index.min.js"></script>
  <script src="/static/live2d-core.js"></script>
  <script src="/static/live2d-emotion.js"></script>
  <script src="/static/live2d-model.js"></script>
  <script src="/static/live2d-interaction.js"></script>
  <script src="/static/live2d-init.js"></script>
  <script src="/static/avatar-popup-common.js"></script>
  <script src="/static/avatar-ui-popup.js"></script>
  <script src="/static/avatar-ui-popup-config.js"></script>
  <script src="/static/avatar-ui-buttons.js"></script>
  <script src="/static/live2d-ui-buttons.js"></script>
  <script src="/static/common-ui-hud.js"></script>
  <script src="/static/avatar-ui-drag.js"></script>
</head>
<body>
  <div id="live2d-container"><canvas id="live2d-canvas"></canvas></div>

  <div id="app" class="theatre-shell">
    <div class="theatre-topbar">
      <div class="theatre-badge">THEATRE MODE</div>
      <div class="theatre-controls">
        <button id="toggleOverlayButton" type="button">切换剧场层</button>
      </div>
    </div>

    <div id="theatreOverlay" class="theatre-overlay visible">
      <div class="theatre-backdrop"></div>
      <div id="innerVoiceLayer" class="inner-voice"></div>
      <div class="stats-panel">
        <div class="stats-title">Affection</div>
        <div class="heart-bar"><div id="heartFill" class="heart-fill"></div></div>
        <div id="statsValue" class="stats-value">50 / mood 0</div>
      </div>
      <div class="dialogue-box">
        <div class="dialogue-label">N.E.K.O.</div>
        <div id="dialogueText" class="dialogue-text"></div>
        <div id="stageText" class="stage-text"></div>
      </div>
    </div>

    <form id="sceneForm" class="scene-form">
      <textarea id="userInput" placeholder="对 N.E.K.O. 说点什么……"></textarea>
      <div class="scene-actions">
        <button id="submitButton" type="submit">生成场景</button>
      </div>
    </form>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
